{{ define "main" }}
<h1><span class="pound">#</span>{{ site.Title }}</h1>

<article>
  {{ .Content }}
  <ul>
    {{ range where site.RegularPages "Section" "posts" }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a> <span class="date">{{ .Date.Format "January 2, 2006" }}</span>
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
