<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>

  <link rel="stylesheet" href="{{ "site.css" | relURL }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ ((site.GetPage "/").OutputFormats.Get "rss").Permalink }}">
</head>
<body>
  <header>
    <a href="{{ "/" | relURL }}">{{ site.Title }}</a>
    <a href="{{ "/index.xml" | relURL }}">RSS</a>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
</body>
</html>
